name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Lint (if configured)
        run: npm run lint --if-present

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Verify CLI runs
        run: node bin/saas.js --version

      - name: Verify all commands registered
        run: |
          node bin/saas.js --help | grep -q "init"
          node bin/saas.js --help | grep -q "stripe"
          node bin/saas.js --help | grep -q "db"
          node bin/saas.js --help | grep -q "auth"
          node bin/saas.js --help | grep -q "env"
          node bin/saas.js --help | grep -q "github"
          node bin/saas.js --help | grep -q "vercel"
          node bin/saas.js --help | grep -q "deploy"
          node bin/saas.js --help | grep -q "domain"
          node bin/saas.js --help | grep -q "email"
          node bin/saas.js --help | grep -q "monitoring"
          node bin/saas.js --help | grep -q "add"
          node bin/saas.js --help | grep -q "status"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
